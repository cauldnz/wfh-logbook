# Build + publish the runtime image to GHCR (HANDOFF §6 Phase 8.D).
#
# - Pushes to `main`  → ghcr.io/<owner>/wfh-logbook:latest
# - Tags `v*`         → ghcr.io/<owner>/wfh-logbook:<version> (+ latest)
#
# Pull example:  docker pull ghcr.io/OWNER/wfh-logbook:latest
# (Make the package public in the GitHub UI after the first push, or
# authenticated pulls only.)

name: docker

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
